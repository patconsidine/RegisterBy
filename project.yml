name: RegisterBy
options:
  bundleIdPrefix: com.registerby
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
targets:
  RegisterBy:
    type: application
    platform: iOS
    sources:
      - path: RegisterBy
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.registerby.app
        INFOPLIST_FILE: RegisterBy/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
    dependencies: []
